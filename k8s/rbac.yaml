apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8swhisperer-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8swhisperer-role
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8swhisperer-rolebinding
  namespace: default
subjects:
- kind: ServiceAccount
  name: k8swhisperer-sa
  namespace: default
roleRef:
  kind: Role
  name: k8swhisperer-role
  apiGroup: rbac.authorization.k8s.io