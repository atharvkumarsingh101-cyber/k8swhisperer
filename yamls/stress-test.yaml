apiVersion: v1
kind: Pod
metadata:
  name: crash-loop-pod
  labels:
    scenario: crashloop
spec:
  containers:
  - name: crasher
    image: busybox
    command: ["sh", "-c", "echo Starting; sleep 2; exit 1"]
---
apiVersion: v1
kind: Pod
metadata:
  name: oom-pod
  labels:
    scenario: oomkilled
spec:
  containers:
  - name: memory-hog
    image: polinux/stress
    command: ["stress"]
    args: ["--vm", "1", "--vm-bytes", "200M", "--timeout", "60s"]
    resources:
      limits:
        memory: "50Mi"
        cpu: "100m"
---
apiVersion: v1
kind: Pod
metadata:
  name: pending-pod
  labels:
    scenario: pending
spec:
  containers:
  - name: pending-container
    image: nginx
    resources:
      requests:
        cpu: "100"
        memory: "100Gi"
---
apiVersion: v1
kind: Pod
metadata:
  name: imagepull-pod
  labels:
    scenario: imagepullbackoff
spec:
  containers:
  - name: bad-image
    image: thisrepo/doesnotexist:v999