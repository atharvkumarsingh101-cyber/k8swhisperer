apiVersion: v1
kind: Pod
metadata:
  name: oom-pod
  labels:
    app: oom-pod
    scenario: oomkilled
spec:
  containers:
  - name: memory-hog
    image: polinux/stress
    command: ["stress"]
    args: ["--vm", "1", "--vm-bytes", "200M", "--timeout", "60s"]
    resources:
      limits:
        memory: "50Mi"
        cpu: "100m"
      requests:
        memory: "25Mi"
        cpu: "50m"
  restartPolicy: Always